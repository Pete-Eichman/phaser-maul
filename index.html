<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Phaser Maul</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #1a1a2e;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      width: min(100dvw, 960px, calc(100dvh * 1.263));
      aspect-ratio: 960 / 760;
    }

    canvas {
      touch-action: none;
      display: block;
    }

    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      z-index: 200;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      text-align: center;
      padding: 32px;
    }

    @media (orientation: portrait) {
      #rotate-overlay { display: flex; }
    }

    #rotate-overlay svg {
      width: 72px;
      height: 72px;
      fill: none;
      stroke: #c9a959;
      stroke-width: 2;
      stroke-linecap: round;
      animation: tilt 2s ease-in-out infinite;
    }

    @keyframes tilt {
      0%, 100% { transform: rotate(0deg); }
      50%       { transform: rotate(-90deg); }
    }

    #rotate-overlay p {
      font-family: Arial, sans-serif;
      font-size: 18px;
      color: #e0e0e0;
    }

    #rotate-overlay small {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: #7a8eaa;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="rotate-overlay">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect x="5" y="2" width="14" height="20" rx="2"/>
      <path d="M19 9a7 7 0 0 0-7-7"/>
      <polyline points="23 5 19 9 15 5"/>
    </svg>
    <p>Rotate your device to landscape</p>
    <small>Phaser Maul requires landscape orientation</small>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
